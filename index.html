
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Preços para Cardápio Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neumorphic {
            background: linear-gradient(145deg, #f0f0f0, #cacaca);
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }
        .neumorphic-inset {
            background: linear-gradient(145deg, #cacaca, #f0f0f0);
            box-shadow: inset 20px 20px 60px #bebebe, inset -20px -20px 60px #ffffff;
        }
        .glassmorphic {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .food-gradient {
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 50%, #32cd32 100%);
        }
        .offcanvas {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        .offcanvas.show {
            transform: translateX(0);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen py-8">

                <button onclick="loadTemplate('cor')" class="w-full glassmorphic text-left p-4 rounded-xl hover:bg-white/40 transition-all duration-300 transform hover:scale-105">

        <!-- Importador Offcanvas -->
        <div id="importer-offcanvas" class="fixed top-0 right-0 h-full w-96 bg-white/95 backdrop-blur-lg shadow-2xl z-50 offcanvas p-6">
            <div class="flex justify-between items-center mb-6">

                    ✕

            </div>
            <p class="text-gray-600 mb-6">Cole uma string gerada para carregar os dados:</p>
            <div class="space-y-4">
                <textarea id="import-string" class="w-full h-32 p-4 glassmorphic rounded-xl border-0 resize-none" placeholder="Ex: Selecione o Tamanho#Pequeno:15,00/Médio:25,00/Grande:35,00"></textarea>
                <button onclick="importString()" class="w-full food-gradient text-white font-bold py-3 px-6 rounded-xl hover:opacity-90 transition-all duration-300 transform hover:scale-105">

        <!-- Overlay -->

        <div class="neumorphic rounded-3xl p-8 mb-8">

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">🏷️ Label Geral:</label>
                    <input type="text" id="general-label" class="w-full p-4 neumorphic-inset rounded-xl border-0 text-gray-800 placeholder-gray-500" placeholder="Ex: Selecione o Tipo" oninput="validateInput(this); updateOutput()">
                </div>
                
                <div class="items-container mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-3">📝 Itens:</label>
                    <div id="items-list">
                        <!-- Itens serão adicionados aqui -->
                    </div>
                    <button id="add-item" class="w-full food-gradient text-white font-bold py-4 px-6 rounded-xl mt-4 transition-all duration-300 transform hover:scale-105 hover:shadow-lg">
                        ➕ Adicionar Novo Item
                    </button>

        </div>
        
        <div class="neumorphic rounded-3xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">✨ Resultado Formatado</h2>
            <div class="relative mb-6">
                <textarea id="output" class="w-full h-32 p-4 neumorphic-inset rounded-xl border-0 bg-gray-50 text-gray-800 font-mono text-sm" readonly placeholder="O resultado aparecerá aqui..."></textarea>
                <button id="copy-output" class="absolute top-3 right-3 glassmorphic text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-white/40 transition-all duration-300 transform hover:scale-105">
                    📋 Copiar
                </button>
            </div>
        </div>

    <script>
        function addItem() {
            const itemsContainer = document.getElementById('items-list');
            const itemId = `item-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            
            const itemHTML = `
                <div id="${itemId}" class="flex gap-3 mb-3 items-center">
                    <input type="text" class="item-label w-7/10 p-4 neumorphic-inset rounded-xl border-0 text-gray-800 placeholder-gray-500" placeholder="Nome do item" oninput="validateInput(this); updateOutput()" style="width: 70%;">
                    <input type="text" class="item-price w-3/10 p-4 neumorphic-inset rounded-xl border-0 text-gray-800 placeholder-gray-500" placeholder="0,00" oninput="formatMoney(this); updateOutput()" style="width: 30%;">
                    <button onclick="removeItem('${itemId}')" class="bg-gradient-to-r from-red-400 to-red-600 hover:from-red-500 hover:to-red-700 text-white font-bold py-3 px-4 rounded-xl transition-all duration-300 transform hover:scale-105">
                        🗑️
                    </button>
                </div>
            `;
            
            itemsContainer.insertAdjacentHTML('beforeend', itemHTML);
            updateOutput();
        }

        function removeItem(itemId) {
            document.getElementById(itemId).remove();
            updateOutput();
        }

        function updateOutput() {
            const generalLabel = document.getElementById('general-label').value.trim();
            const items = document.querySelectorAll('[id^="item-"]');
            
            const itemPairs = [];
            
            items.forEach(item => {
                const label = item.querySelector('.item-label').value.trim();
                const price = item.querySelector('.item-price').value.trim();
                
                if (label || price) {
                    let formattedPrice = '0,00';
                    if (price) {
                        // Remove formatação e converte para número
                        const cleanPrice = price.replace(/\./g, '').replace(',', '.');
                        const numPrice = parseFloat(cleanPrice);
                        if (!isNaN(numPrice)) {
                            formattedPrice = numPrice.toLocaleString('pt-BR', {
                                minimumFractionDigits: 2,
                                maximumFractionDigits: 2
                            });
                        }
                    }
                    const itemLabel = label || 'Item';
                    itemPairs.push(`${itemLabel}:${formattedPrice}`);
                }
            });
            
            if (generalLabel || itemPairs.length > 0) {
                const labelPart = generalLabel || 'Label';
                const itemsPart = itemPairs.length > 0 ? itemPairs.join('/') : '';
                
                if (itemsPart) {
                    document.getElementById('output').value = `${labelPart}#${itemsPart}`;
                } else {
                    document.getElementById('output').value = labelPart;
                }
            } else {
                document.getElementById('output').value = '';
            }
        }

        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            output.setSelectionRange(0, 99999);
            document.execCommand('copy');
            
            const button = document.getElementById('copy-output');
            const originalText = button.textContent;
            button.textContent = 'Copiado!';
            button.classList.remove('bg-green-500', 'hover:bg-green-600');
            button.classList.add('bg-green-600');
            
            setTimeout(() => {
                button.textContent = originalText;
                button.classList.remove('bg-green-600');
                button.classList.add('bg-green-500', 'hover:bg-green-600');
            }, 2000);
        }

        function validateInput(input) {
             // Remove caracteres proibidos: dois pontos (:), barra (/) e vírgula (,)
             const forbiddenChars = /[:,/]/g;
            if (forbiddenChars.test(input.value)) {
                input.value = input.value.replace(forbiddenChars, '');
                // Adiciona feedback visual temporário
                input.classList.add('border-red-500');
                setTimeout(() => {
                    input.classList.remove('border-red-500');
                }, 1000);
            }
            updateOutput();
        }

        function formatMoney(input) {
            let value = input.value.replace(/\D/g, '');
            
            if (value === '') {
                input.value = '';
                return;
            }
            
            // Converte para centavos
            value = parseInt(value);
            
            // Formata como moeda brasileira
            const formatted = (value / 100).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            
            input.value = formatted;
        }

        // Templates de demonstração
        const templates = {
            bebidas: {
                label: 'Selecione o Tamanho',
                items: [['Pequeno (300ml)', '8,50'], ['Médio (500ml)', '12,00'], ['Grande (700ml)', '15,50']]
            },
            embalagem: {
                label: 'Selecione a Embalagem',
                items: [['Caixa', '2,00'], ['Saco', '0,50'], ['Pote', '3,00'], ['Bandeja', '1,50']]
            },
            apresentacao: {
                label: 'Selecione a Apresentação',
                items: [['Inteiro', '25,00'], ['Fatias', '5,00'], ['Porções', '8,00'], ['Unidades', '3,00']]
            },
            quantidade: {
                label: 'Selecione a Quantidade',
                items: [['1 unidade', '5,00'], ['6 unidades', '25,00'], ['12 unidades', '45,00'], ['24 unidades', '80,00']]
            },
            cor: {

                items: [['Branco', '15,00'], ['Preto', '15,00'], ['Azul', '18,00'], ['Vermelho', '18,00']]
            },
            modelo: {
                label: 'Selecione o Modelo',
                items: [['Básico', '20,00'], ['Premium', '35,00'], ['Deluxe', '50,00'], ['Especial', '75,00']]
            },
            sabor: {
                label: 'Selecione o Sabor',
                items: [['Chocolate', '12,00'], ['Morango', '12,00'], ['Baunilha', '10,00'], ['Coco', '14,00']]
            },
            recheio: {
                label: 'Selecione o Recheio',
                items: [['Doce de Leite', '8,00'], ['Nutella', '12,00'], ['Frutas', '10,00'], ['Creme', '6,00']]
            },
            pizza: {
                label: 'Escolha o Tamanho',
                items: [['Pequena (25cm)', '28,90'], ['Média (30cm)', '38,90'], ['Grande (35cm)', '48,90'], ['Família (40cm)', '58,90']]
            },
            cafe: {
                label: 'Selecione o Tipo',
                items: [['Expresso', '4,50'], ['Cappuccino', '7,90'], ['Latte', '8,50'], ['Mocha', '9,90']]
            },
            acai: {
                label: 'Escolha o Tamanho',
                items: [['300ml', '12,90'], ['500ml', '18,90'], ['700ml', '24,90'], ['1L', '32,90']]
            },
            hamburguer: {
                label: 'Selecione o Tamanho',
                items: [['Simples', '15,90'], ['Duplo', '22,90'], ['Triplo', '28,90'], ['Artesanal', '35,90']]
            },
            tamanho: {
                label: 'Selecione o Tamanho',
                items: [['P', '15,00'], ['M', '25,00'], ['G', '35,00'], ['GG', '45,00']]
            },
            cobertura: {
                label: 'Selecione a Cobertura',
                items: [['Chocolate', '5,00'], ['Morango', '5,00'], ['Caramelo', '6,00'], ['Baunilha', '4,00']]
            },
            acabamento: {
                label: 'Selecione o Acabamento',
                items: [['Verniz', '50,00'], ['Acrílico', '75,00'], ['Melizado', '100,00'], ['Natural', '25,00']]
            },
            garantia: {
                 label: 'Selecione a Garantia',
                 items: [['1 ano', '25,00'], ['3 anos', '75,00'], ['5 anos', '125,00'], ['Vitalícia', '250,00']]
             }
        };

        function toggleTemplates() {
            const offcanvas = document.getElementById('templates-offcanvas');
            const overlay = document.getElementById('overlay');
            
            if (offcanvas.classList.contains('show')) {
                offcanvas.classList.remove('show');
                overlay.classList.add('hidden');
            } else {
                // Fechar importador se estiver aberto
                document.getElementById('importer-offcanvas').classList.remove('show');
                offcanvas.classList.add('show');
                overlay.classList.remove('hidden');
            }
        }

        function toggleImporter() {
            const offcanvas = document.getElementById('importer-offcanvas');
            const overlay = document.getElementById('overlay');
            
            if (offcanvas.classList.contains('show')) {
                offcanvas.classList.remove('show');
                overlay.classList.add('hidden');
            } else {
                // Fechar templates se estiver aberto
                document.getElementById('templates-offcanvas').classList.remove('show');
                offcanvas.classList.add('show');
                overlay.classList.remove('hidden');
            }
        }

        function closeOffcanvas() {
            document.getElementById('templates-offcanvas').classList.remove('show');
            document.getElementById('importer-offcanvas').classList.remove('show');
            document.getElementById('overlay').classList.add('hidden');
        }

        function loadTemplate(templateName) {
            const template = templates[templateName];
            if (!template) return;

            // Limpar itens existentes
            document.getElementById('items-list').innerHTML = '';
            
            // Definir label geral
            document.getElementById('general-label').value = template.label;
            
            // Adicionar itens do template
            template.items.forEach(([name, price]) => {
                addItem();
                const items = document.querySelectorAll('[id^="item-"]');
                const lastItem = items[items.length - 1];
                lastItem.querySelector('.item-label').value = name;
                lastItem.querySelector('.item-price').value = price;
                formatMoney(lastItem.querySelector('.item-price'));
            });
            
            updateOutput();
            closeOffcanvas();
            
            // Feedback visual
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-xl shadow-lg z-50';
            notification.textContent = `✅ Template "${template.label}" carregado com sucesso!`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function importString() {
            const importStr = document.getElementById('import-string').value.trim();
            if (!importStr) return;
            
            try {
                const [label, itemsStr] = importStr.split('#');
                if (!label || !itemsStr) throw new Error('Formato inválido');
                
                // Limpar itens existentes
                document.getElementById('items-list').innerHTML = '';
                
                // Definir label geral
                document.getElementById('general-label').value = label;
                
                // Processar itens
                const items = itemsStr.split('/');
                items.forEach(itemStr => {
                    const [name, price] = itemStr.split(':');
                    if (name && price) {
                        addItem();
                        const itemElements = document.querySelectorAll('[id^="item-"]');
                        const lastItem = itemElements[itemElements.length - 1];
                        lastItem.querySelector('.item-label').value = name;
                        lastItem.querySelector('.item-price').value = price;
                    }
                });
                
                updateOutput();
                document.getElementById('import-string').value = '';
                
                // Feedback visual
                const button = event.target;
                const originalText = button.textContent;
                button.textContent = 'Importado!';
                button.classList.remove('bg-indigo-500', 'hover:bg-indigo-600');
                button.classList.add('bg-green-600');
                
                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('bg-green-600');
                    button.classList.add('bg-indigo-500', 'hover:bg-indigo-600');
                }, 2000);
                
            } catch (error) {
                alert('Formato inválido! Use o formato: Label#Item1:Preço1/Item2:Preço2');
            }
        }

        // Event listeners
        document.getElementById('add-item').addEventListener('click', addItem);
        document.getElementById('copy-output').addEventListener('click', copyOutput);

        // Adicionar um item inicial
        addItem();
    </script>
</body>
</html>
